name: Arbaz CICD Workflow 

on : [push]

jobs: 
  build:
    runs-on: ubuntu-latest
    steps: 
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Node.js 
      uses: actions/setup-node@v4
      with: 
        node-version: '14'
    - name: Install dependencies
      run:  echo "No dependencies to install" 
    - name: Run tests
      run: |
      test -f README.md
      test -f .github/workflows/ci.yaml